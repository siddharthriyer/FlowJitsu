name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  build-macos-app:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install app build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build macOS app bundle
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name FlowGateApp \
            --paths "${{ github.workspace }}/src" \
            --hidden-import tkinter \
            --collect-submodules FlowCytometryTools \
            --collect-submodules flow_gate_app \
            "${{ github.workspace }}/src/flow_gate_app/__main__.py"

      - name: Zip app bundle
        run: ditto -c -k --sequesterRsrc --keepParent "dist/FlowGateApp.app" "dist/FlowGateApp-macos.zip"

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/FlowGateApp-macos.zip

  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-wheel, build-macos-app]
    runs-on: ubuntu-latest
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-app
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
